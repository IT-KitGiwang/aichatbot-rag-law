version: '3.8'

services:
  # === BACKEND (FastAPI) ===
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # === FRONTEND (React + Vite) ===
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # === PostgreSQL Database ===
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_rag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot_user} -d ${POSTGRES_DB:-chatbot_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === Redis (Cache & Session) ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
